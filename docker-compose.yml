services:
  telecat-frontend:
    container_name: telecat-frontend
    image: telecat-frontend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-2616}:2616"
